<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Root Words — Kimberley School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --accent:#E8611A;
  --cream:#f5f0dc;
  --ink:#1a1a1a;
  --bg:#e8e4dc;
  --surface:#fff;
  --border:#ccc;
  --border-strong:#aaa;
  --text:#1a1a1a;
  --text-muted:#888;
  --text-sub:#555;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --success-bg:#e6f4ea;--success-text:#1e6e35;
  --warn-bg:#fff8e1;--warn-text:#8a6800;
  --danger-bg:#fdecea;--danger-text:#b71c1c;
}
body{
  font-family:'EB Garamond',Georgia,serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:1.25rem 1.5rem 2rem;gap:1rem;
}

/* ── SUBJECT FILTER ── */
.subject-filter{display:flex;flex-wrap:wrap;gap:5px;width:100%;max-width:920px;}
.subj-chip{
  font-size:10.5px;padding:4px 10px;border-radius:20px;
  border:1.5px solid var(--border-strong);background:transparent;
  color:var(--text-sub);cursor:pointer;font-family:var(--sans);transition:all .12s;
}
.subj-chip.active{color:#fff;}

/* ── MAIN LAYOUT ── */
.main-layout{display:flex;gap:28px;align-items:flex-start;width:100%;max-width:920px;justify-content:center;}

/* ── BOOK ── */
.book-col{display:flex;flex-direction:column;align-items:center;gap:10px;flex-shrink:0;}
.book-cover{width:330px;border:3px solid var(--ink);box-shadow:5px 5px 0 var(--ink);background:var(--accent);}
.cover-top{background:var(--accent);padding:16px 18px 12px;display:flex;flex-direction:column;align-items:center;}
.penguin-bar{width:100%;height:6px;}
.penguin-oval{
  background:var(--cream);border:2.5px solid var(--ink);
  border-radius:50% 50% 55% 55%/45% 45% 55% 55%;
  padding:12px 16px 14px;text-align:center;width:178px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;margin-top:6px;
}
.root-type-label{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#888;font-family:var(--sans);margin-bottom:3px;}
.root-main{
  font-family:'EB Garamond',Georgia,serif;font-weight:600;color:var(--ink);
  letter-spacing:.05em;line-height:1;word-break:break-word;width:100%;text-align:center;
}
.root-main.title-state{font-size:38px;color:#bbb;letter-spacing:.12em;}
.h-rule{width:100%;height:2.5px;background:var(--ink);}
.cover-white{background:var(--cream);display:flex;align-items:stretch;min-height:210px;}
.side-label{
  writing-mode:vertical-rl;font-family:'EB Garamond',Georgia,serif;
  font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--accent);padding:14px 6px;flex-shrink:0;
}
.side-label.flip{transform:rotate(180deg);}
.words-section{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 6px;}
.cover-divider{width:50px;height:2px;background:var(--accent);margin:8px auto 4px;}

/* tiles */
.word-tile{width:100%;text-align:center;padding:5px 6px;cursor:pointer;border-radius:3px;margin:2px 0;}
.tile-hidden{border:1.5px dashed #ccc;font-size:12px;color:#aaa;font-style:italic;font-family:var(--sans);}
.tile-hidden:hover{border-color:var(--accent);}
.tile-revealed{cursor:default;}
.tile-word-row{display:flex;align-items:center;justify-content:center;gap:5px;flex-wrap:wrap;}
.tile-word-text{font-size:19px;font-weight:600;color:var(--ink);line-height:1.2;}
.tile-note{font-size:11px;color:var(--text-sub);font-style:italic;font-family:var(--sans);margin-top:1px;display:none;}
.tile-note.show{display:block;}
.root-hl{color:var(--accent);}
.subj-tag{font-size:8px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;padding:2px 5px;border-radius:8px;font-family:var(--sans);color:#fff;flex-shrink:0;}
.no-words-msg{font-size:12px;color:#aaa;font-style:italic;font-family:var(--sans);text-align:center;padding:1.5rem 0.5rem;}
.title-prompt{font-size:13px;color:#bbb;font-family:var(--sans);text-align:center;padding:2rem 0.5rem;font-style:italic;}

/* book bottom */
.cover-bottom{background:var(--accent);padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:10px;}
.school-logo{width:38px;height:38px;object-fit:contain;}
.school-text{font-family:'EB Garamond',Georgia,serif;font-size:13px;color:var(--cream);letter-spacing:.12em;text-transform:uppercase;}

/* ── CONTROLS ── */
.controls-col{display:flex;flex-direction:column;gap:14px;flex:1;min-width:280px;max-width:400px;padding-top:4px;}
.toolbar{display:flex;flex-direction:column;gap:10px;}
.toolbar-row{display:flex;gap:6px;align-items:center;justify-content:space-between;}
.tb-label{font-size:11px;color:var(--text-muted);font-family:var(--sans);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;}
.seg{display:flex;border:1.5px solid var(--border-strong);border-radius:5px;overflow:hidden;}
.seg-btn{
  padding:5px 11px;font-size:12px;font-family:var(--sans);background:transparent;
  border:none;color:var(--text-sub);cursor:pointer;transition:all .12s;
  border-right:1px solid var(--border);
}
.seg-btn:last-child{border-right:none;}
.seg-btn.active{background:var(--accent);color:#fff;}

/* DICE — prominent */
.dice-btn{
  width:100%;padding:12px;
  background:var(--accent);color:#fff;
  border:none;border-radius:6px;
  font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-family:var(--sans);font-weight:600;letter-spacing:.04em;
  transition:opacity .15s;box-shadow:0 2px 6px rgba(232,97,26,.35);
}
.dice-btn:hover{opacity:.88;}
.dice-btn span.dice-label{font-size:14px;letter-spacing:.06em;}

/* custom word panel */
.section-rule{border:none;border-top:1px solid var(--border);margin:4px 0;}
.custom-toggle{
  background:transparent;border:1.5px solid var(--border-strong);border-radius:5px;
  font-family:var(--sans);font-size:12px;color:var(--text-sub);cursor:pointer;
  padding:6px 12px;width:100%;text-align:left;transition:background .12s;
}
.custom-toggle:hover{background:#f0ede6;}
.custom-panel{display:none;flex-direction:column;gap:8px;padding:10px;background:#faf8f3;border:1px solid var(--border);border-radius:5px;}
.custom-panel.open{display:flex;}
.custom-panel label{font-size:11px;color:var(--text-muted);font-family:var(--sans);letter-spacing:.06em;text-transform:uppercase;}
.custom-panel input,.custom-panel select{
  width:100%;padding:6px 9px;font-family:'EB Garamond',Georgia,serif;font-size:15px;
  border:1.5px solid var(--border-strong);border-radius:4px;background:#fff;color:var(--ink);outline:none;
}
.custom-panel input:focus,.custom-panel select:focus{border-color:var(--accent);}
.custom-panel input[type=text]{font-size:14px;font-family:var(--sans);}
.subj-picker{display:flex;flex-wrap:wrap;gap:4px;}
.subj-pick-btn{
  font-size:10px;padding:3px 8px;border-radius:14px;border:1.5px solid var(--border-strong);
  background:transparent;color:var(--text-sub);cursor:pointer;font-family:var(--sans);transition:all .12s;
}
.subj-pick-btn.active{color:#fff;}
.add-word-btn{
  padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:4px;
  font-size:13px;font-family:var(--sans);cursor:pointer;font-weight:500;transition:opacity .12s;
}
.add-word-btn:hover{opacity:.85;}
.custom-words-list{display:flex;flex-direction:column;gap:4px;max-height:120px;overflow-y:auto;}
.custom-word-item{
  display:flex;align-items:center;justify-content:space-between;gap:6px;
  font-size:12px;font-family:var(--sans);padding:4px 6px;
  background:#fff;border:1px solid var(--border);border-radius:3px;
}
.custom-word-item .cw-word{font-weight:600;color:var(--ink);}
.custom-word-item .cw-note{color:var(--text-muted);flex:1;font-style:italic;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.del-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:14px;padding:0 2px;}
.del-btn:hover{color:#b71c1c;}
.card-counter{font-size:11px;color:var(--text-muted);font-family:var(--sans);text-align:center;}
/* reveal answer */
.reveal-btn{
  width:100%;padding:10px;margin-top:2px;
  background:transparent;color:var(--accent);
  border:2px solid var(--accent);border-radius:6px;
  font-size:13px;font-family:var(--sans);font-weight:600;letter-spacing:.04em;
  cursor:pointer;transition:all .15s;
}
.reveal-btn:hover{background:var(--accent);color:#fff;}
.reveal-btn:disabled{opacity:.35;cursor:not-allowed;}
.answer-bar{
  display:none;padding:10px 13px;border-radius:5px;
  background:#e6f4ea;color:#1e6e35;
  font-size:13px;font-family:var(--sans);line-height:1.4;
  border:1px solid #a8d5b5;
}
.answer-bar.show{display:block;}
/* add-card panel tabs */
.panel-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:8px;}
.panel-tab{
  padding:5px 12px;font-size:12px;font-family:var(--sans);background:transparent;
  border:none;border-bottom:2px solid transparent;cursor:pointer;color:var(--text-muted);
  margin-bottom:-1px;transition:all .12s;
}
.panel-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.tab-pane{display:none;flex-direction:column;gap:8px;}
.tab-pane.active{display:flex;}
.custom-cards-list{display:flex;flex-direction:column;gap:4px;max-height:100px;overflow-y:auto;}
</style>
</head>
<body>

<div class="subject-filter" id="subjectFilter"></div>

<div class="main-layout">

  <!-- BOOK -->
  <div class="book-col">
    <div class="book-cover" id="bookCover">
      <div class="cover-top">
        <div class="penguin-bar"></div>
        <div class="penguin-oval">
          <div class="root-type-label" id="rootTypeLabel"></div>
          <div class="root-main title-state" id="rootWord">ROOT</div>
        </div>
      </div>
      <div class="h-rule"></div>
      <div class="cover-white">
        <span class="side-label">Root Words</span>
        <div class="words-section" id="wordsSection">
          <div class="title-prompt">Select a key stage and subject filter, then press the dice button to begin</div>
          <div class="cover-divider" id="initDivider"></div>
        </div>
        <span class="side-label flip">Root Words</span>
      </div>
      <div class="h-rule"></div>
      <div class="cover-bottom">
        <span class="school-text">Kimberley</span>
        <img src="ks_crest.png" alt="Kimberley School" class="school-logo">
        <span class="school-text">School</span>
      </div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls-col">
    <div class="toolbar">

      <div class="toolbar-row">
        <span class="tb-label">Key stage</span>
        <div class="seg" id="levelSeg">
          <button class="seg-btn active" onclick="setLevel('ks3')">KS3</button>
          <button class="seg-btn" onclick="setLevel('gcse')">GCSE</button>
          <button class="seg-btn" onclick="setLevel('alevel')">A Level</button>
        </div>
      </div>

      <div class="toolbar-row">
        <span class="tb-label">Display</span>
        <div class="seg" id="modeSeg">
          <button class="seg-btn active" onclick="setMode('A')">Reveal words</button>
          <button class="seg-btn" onclick="setMode('B')">Show all</button>
        </div>
      </div>

      <!-- PROMINENT RANDOM BUTTON -->
      <button class="dice-btn" onclick="pickRandom()" title="Pick a random root">
        <span style="font-size:26px;">⚄</span>
        <span class="dice-label">RANDOM ROOT</span>
      </button>

      <div class="card-counter" id="cardCounter"></div>

      <!-- REVEAL ANSWER -->
      <button class="reveal-btn" id="revealBtn" onclick="revealAnswer()" disabled>Reveal answer</button>
      <div class="answer-bar" id="answerBar"></div>

    </div>

    <hr class="section-rule">

    <!-- CUSTOM PANEL -->
    <button class="custom-toggle" onclick="toggleCustom()" id="customToggleBtn">＋ Customise cards</button>
    <div class="custom-panel" id="customPanel">

      <div class="panel-tabs">
        <button class="panel-tab active" onclick="switchTab('word')">Add word to card</button>
        <button class="panel-tab" onclick="switchTab('card')">Add new card</button>
      </div>

      <!-- TAB: ADD WORD -->
      <div class="tab-pane active" id="tabWord">
        <div>
          <label>Word</label>
          <input type="text" id="cwWord" placeholder="e.g. Epinephrine">
        </div>
        <div>
          <label>Definition / note</label>
          <input type="text" id="cwNote" placeholder="e.g. another name for adrenaline">
        </div>
        <div>
          <label>Part to highlight (the root within the word)</label>
          <input type="text" id="cwHl" placeholder="e.g. epi">
        </div>
        <div>
          <label>Key stage</label>
          <select id="cwLevel">
            <option value="ks3">KS3</option>
            <option value="gcse" selected>GCSE</option>
            <option value="alevel">A Level</option>
          </select>
        </div>
        <div>
          <label>Subject areas</label>
          <div class="subj-picker" id="subjPicker"></div>
        </div>
        <button class="add-word-btn" onclick="addCustomWord()">Add word to this card</button>
        <div>
          <label>Words added to this card</label>
          <div class="custom-words-list" id="customWordsList"></div>
        </div>
      </div>

      <!-- TAB: ADD CARD -->
      <div class="tab-pane" id="tabCard">
        <div>
          <label>Root word (e.g. CHRON)</label>
          <input type="text" id="ncRoot" placeholder="e.g. CHRON">
        </div>
        <div>
          <label>Type</label>
          <select id="ncType">
            <option value="prefix">Prefix</option>
            <option value="root" selected>Root</option>
            <option value="suffix">Suffix</option>
          </select>
        </div>
        <div>
          <label>Meaning (e.g. Time)</label>
          <input type="text" id="ncMeaning" placeholder="e.g. Time">
        </div>
        <div>
          <label>Origin (e.g. Greek: chronos)</label>
          <input type="text" id="ncOrigin" placeholder="e.g. Greek: chronos">
        </div>
        <button class="add-word-btn" onclick="addCustomCard()">Create card</button>
        <div>
          <label>Your custom cards</label>
          <div class="custom-cards-list" id="customCardsList"></div>
        </div>
      </div>

    </div>

  </div>
</div>

<script>
const PALETTE=['#E8611A','#3C7A3C','#5B3A8A','#C4302B','#1A5F8A'];
const LO={ks3:0,gcse:1,alevel:2};

const SUBJECT_COL={
  'Science':'#2E7D32','English/Media':'#6A1B9A','History':'#A1432D',
  'French':'#0277BD','Spanish':'#C62828','Maths':'#B8860B','Geography':'#00838F',
  'RS':'#5D4037','PE':'#EF6C00','Music & Drama':'#7B1FA2','DT':'#455A64',
  'H&SC':'#AD1457','IT':'#00695C','Business':'#E65100'
};
const SUBJECT_ABBR={
  'Science':'Sci','English/Media':'Eng','History':'Hist','French':'Fr','Spanish':'Sp',
  'Maths':'Maths','Geography':'Geog','RS':'RS','PE':'PE','Music & Drama':'Mus/Dr',
  'DT':'DT','H&SC':'H&SC','IT':'IT','Business':'Bus'
};
const ALL_SUBJECTS=Object.keys(SUBJECT_COL);

const ALL_CARDS=[
  // ── QUANTITY / NUMBER ──
  {root:'AER',type:'root',meaning:'Air',origin:'Greek: aer',colour:0,synonyms:['air','atmosphere','gas','wind'],
   words:[
    {word:'Aerate',note:'to introduce air into something',hl:'Aer',level:'ks3',subj:['Science']},
    {word:'Aeroplane',note:'aircraft that flies through air',hl:'Aer',level:'ks3',subj:['Science','English/Media']},
    {word:'Aerosol',note:'tiny particles suspended in air',hl:'Aer',level:'ks3',subj:['Science']},
    {word:'Aerobic',note:'requiring oxygen (air) to live or exercise',hl:'Aer',level:'gcse',subj:['Science','PE']},
    {word:'Aerodynamic',note:'shaped to move easily through air',hl:'Aer',level:'gcse',subj:['Science','PE','DT']},
    {word:'Anaerobic',note:'exercise or respiration without oxygen (air)',hl:'aer',level:'gcse',subj:['Science','PE']},
  ]},
  {root:'BI',type:'prefix',meaning:'Two',origin:'Latin: bis',colour:1,synonyms:['two','double','twice','dual','pair'],
   words:[
    {word:'Bicycle',note:'two-wheeled vehicle',hl:'Bi',level:'ks3',subj:['English/Media','PE']},
    {word:'Bilingual',note:'speaking two languages',hl:'Bi',level:'ks3',subj:['French','Spanish','English/Media']},
    {word:'Binocular',note:'instrument using two eyes',hl:'Bi',level:'ks3',subj:['Science']},
    {word:'Bisect',note:'to cut into two equal parts',hl:'Bi',level:'gcse',subj:['Maths']},
    {word:'Bipolar',note:'having two opposite poles',hl:'Bi',level:'gcse',subj:['Science']},
    {word:'Biceps',note:'muscle with two attachment points',hl:'Bi',level:'gcse',subj:['Science','PE']},
    {word:'Binomial',note:'expression or name with two parts',hl:'Bi',level:'alevel',subj:['Maths','Science']},
  ]},
  {root:'MONO',type:'prefix',meaning:'One',origin:'Greek: monos',colour:2,synonyms:['one','single','sole','alone','only'],
   words:[
    {word:'Monotone',note:'a single, unchanging tone',hl:'Mono',level:'ks3',subj:['English/Media','Music & Drama']},
    {word:'Monologue',note:'speech by one person',hl:'Mono',level:'ks3',subj:['English/Media','Music & Drama']},
    {word:'Monopoly',note:'control by a single company',hl:'Mono',level:'ks3',subj:['History','Business']},
    {word:'Monochrome',note:'using a single colour',hl:'Mono',level:'gcse',subj:['English/Media']},
    {word:'Monosaccharide',note:'simplest single sugar unit',hl:'Mono',level:'gcse',subj:['Science','H&SC']},
    {word:'Monomer',note:'a single unit that joins to form a polymer',hl:'Mono',level:'alevel',subj:['Science']},
  ]},
  {root:'POLY',type:'prefix',meaning:'Many',origin:'Greek: polys',colour:3,synonyms:['many','several','multiple','numerous'],
   words:[
    {word:'Polygon',note:'a shape with many sides',hl:'Poly',level:'ks3',subj:['Maths']},
    {word:'Polystyrene',note:'a lightweight polymer made of many styrene units',hl:'Poly',level:'ks3',subj:['Science','DT']},
    {word:'Polyglot',note:'a person who speaks many languages',hl:'Poly',level:'gcse',subj:['French','Spanish']},
    {word:'Polymer',note:'large molecule made of many repeating units, used in plastics',hl:'Poly',level:'gcse',subj:['Science','DT']},
    {word:'Polysaccharide',note:'carbohydrate made of many sugar units',hl:'Poly',level:'alevel',subj:['Science','H&SC']},
    {word:'Polymerase',note:'enzyme that builds many-unit DNA or RNA chains',hl:'Poly',level:'alevel',subj:['Science']},
  ]},
  {root:'MULTI',type:'prefix',meaning:'Many',origin:'Latin: multus',colour:4,synonyms:['many','multiple','several','more than one'],
   words:[
    {word:'Multiply',note:'to increase many times over',hl:'Multi',level:'ks3',subj:['Maths']},
    {word:'Multicultural',note:'involving many cultures',hl:'Multi',level:'ks3',subj:['History','RS']},
    {word:'Multitask',note:'to do many things at once',hl:'Multi',level:'ks3',subj:['English/Media','Business']},
    {word:'Multicellular',note:'made up of many cells',hl:'Multi',level:'gcse',subj:['Science']},
    {word:'Multimedia',note:'using many forms of media together',hl:'Multi',level:'gcse',subj:['English/Media','IT']},
  ]},
  {root:'SEMI',type:'prefix',meaning:'Half',origin:'Latin: semi',colour:0,synonyms:['half','partial','partly','incomplete'],
   words:[
    {word:'Semicircle',note:'exactly half a circle',hl:'Semi',level:'ks3',subj:['Maths']},
    {word:'Semifinal',note:'the round immediately before the final',hl:'Semi',level:'ks3',subj:['PE','English/Media']},
    {word:'Semicolon',note:'punctuation mark halfway between comma and full stop',hl:'Semi',level:'ks3',subj:['English/Media']},
    {word:'Semiconductor',note:'material that partly conducts electricity — key in IT hardware',hl:'Semi',level:'gcse',subj:['Science','IT']},
    {word:'Semipermeable',note:'allowing only some substances to pass through',hl:'Semi',level:'gcse',subj:['Science']},
    {word:'Seminiferous',note:'tubules that are partly responsible for carrying sperm',hl:'Semi',level:'alevel',subj:['Science']},
  ]},
  {root:'MICRO',type:'prefix',meaning:'Small',origin:'Greek: mikros',colour:1,synonyms:['small','tiny','minute','microscopic'],
   words:[
    {word:'Microscope',note:'instrument for seeing very small things',hl:'Micro',level:'ks3',subj:['Science']},
    {word:'Microwave',note:'a very short electromagnetic wave',hl:'Micro',level:'ks3',subj:['Science']},
    {word:'Microphone',note:'device that picks up small sounds',hl:'Micro',level:'ks3',subj:['Science','Music & Drama']},
    {word:'Microorganism',note:'a very small living thing — important for food hygiene',hl:'Micro',level:'gcse',subj:['Science','H&SC']},
    {word:'Microhabitat',note:'a small, specific living environment',hl:'Micro',level:'gcse',subj:['Science','Geography']},
    {word:'Microprocessor',note:'a very small processing chip — the brain of a computer',hl:'Micro',level:'gcse',subj:['IT']},
    {word:'Microvilli',note:'tiny finger-like projections that increase surface area',hl:'Micro',level:'alevel',subj:['Science']},
  ]},
  {root:'MEGA / MAGNI',type:'prefix',meaning:'Large / Great',origin:'Greek/Latin: megas / magnus',colour:2,synonyms:['large','great','huge','enormous','big'],
   words:[
    {word:'Magnify',note:'to make something appear larger',hl:'Magni',level:'ks3',subj:['Science']},
    {word:'Magnificent',note:'impressively large or great',hl:'Magni',level:'ks3',subj:['English/Media']},

// CARDS built dynamically via buildCards() above

// ── STATE ──
let currentIdx=null;
let mode='A';
let level='ks3';
let activeSubjects=new Set();
let revealed=[];
let solved=false;
let customPanelOpen=false;
let selectedSubjPick=new Set();
let activeTab='word';

// ── LOCALSTORAGE: custom words keyed by root ──
function customKey(root){return 'rootwords_custom_'+root;}
const CUSTOM_CARDS_KEY='rootwords_custom_cards';

function loadCustomWords(root){
  try{const s=localStorage.getItem(customKey(root));return s?JSON.parse(s):[];}catch(e){return[];}
}

function saveCustomWords(root,words){
  try{localStorage.setItem(customKey(root),JSON.stringify(words));}catch(e){}
}

function loadCustomCards(){
  try{const s=localStorage.getItem(CUSTOM_CARDS_KEY);return s?JSON.parse(s):[];}catch(e){return[];}
}

function saveCustomCards(cards){
  try{localStorage.setItem(CUSTOM_CARDS_KEY,JSON.stringify(cards));}catch(e){}
}

// Build full CARDS array including custom cards
function buildCards(){
  const seen=new Set();
  const base=ALL_CARDS.filter(c=>{if(seen.has(c.root))return false;seen.add(c.root);return true;});
  const custom=loadCustomCards().filter(c=>{if(seen.has(c.root))return false;seen.add(c.root);return true;});
  return [...base,...custom];
}

let CARDS=buildCards();

// ── ACCENT ──
function accentCol(){
  if(currentIdx===null)return'#E8611A';
  return PALETTE[CARDS[currentIdx].colour];
}

function setAccent(){
  document.documentElement.style.setProperty('--accent',accentCol());
}

// ── FILTERS ──
function passesSubjectFilter(w){
  if(activeSubjects.size===0)return true;
  return w.subj.some(s=>activeSubjects.has(s));
}

function wordsForLevel(card){
  const maxL=LO[level];
  const base=card.words.filter(w=>LO[w.level]<=maxL&&passesSubjectFilter(w));
  const custom=loadCustomWords(card.root).filter(w=>LO[w.level]<=maxL&&passesSubjectFilter(w));
  return [...base,...custom];
}

// ── SUBJECT FILTER CHIPS ──
function renderSubjectFilter(){
  const area=document.getElementById('subjectFilter');
  area.innerHTML='';
  ALL_SUBJECTS.forEach(s=>{
    const btn=document.createElement('button');
    btn.className='subj-chip'+(activeSubjects.has(s)?' active':'');
    btn.textContent=s;
    btn.style.borderColor=SUBJECT_COL[s];
    if(activeSubjects.has(s))btn.style.background=SUBJECT_COL[s];
    btn.onclick=()=>{
      if(activeSubjects.has(s))activeSubjects.delete(s);else activeSubjects.add(s);
      renderSubjectFilter();
      if(currentIdx!==null)renderWords();
    };
    area.appendChild(btn);
  });
}

// ── SUBJECT PICKER (custom panel) ──
function renderSubjPicker(){
  const area=document.getElementById('subjPicker');
  area.innerHTML='';
  ALL_SUBJECTS.forEach(s=>{
    const btn=document.createElement('button');
    btn.className='subj-pick-btn'+(selectedSubjPick.has(s)?' active':'');
    btn.textContent=SUBJECT_ABBR[s];
    btn.title=s;
    btn.style.borderColor=SUBJECT_COL[s];
    if(selectedSubjPick.has(s))btn.style.background=SUBJECT_COL[s];
    btn.onclick=()=>{
      if(selectedSubjPick.has(s))selectedSubjPick.delete(s);else selectedSubjPick.add(s);
      renderSubjPicker();
    };
    area.appendChild(btn);
  });
}

// ── HIGHLIGHT HELPER ──
function hlWord(word,h){
  const lo=word.toLowerCase(),hlo=h.toLowerCase();
  const i=lo.indexOf(hlo);
  if(i===-1)return`<span class="tile-word-text">${word}</span>`;
  return`<span class="tile-word-text">${word.slice(0,i)}<span class="root-hl">${word.slice(i,i+h.length)}</span>${word.slice(i+h.length)}</span>`;
}

function subjTags(subjArr){
  return subjArr.map(s=>`<span class="subj-tag" style="background:${SUBJECT_COL[s]}">${SUBJECT_ABBR[s]}</span>`).join('');
}

// ── FONT SCALING ──
function scaledFontSize(t){
  const l=t.replace(/^\-/,'').replace(/\s*\/\s*.+/,'').trim().length;
  if(l<=4)return'36px';
  if(l<=6)return'30px';
  if(l<=8)return'25px';
  return'20px';
}

// ── RENDER CARD ──
function renderCard(idx){
  currentIdx=idx;
  revealed=[];
  solved=false;
  setAccent();

  const card=CARDS[idx];
  const rw=document.getElementById('rootWord');
  rw.textContent=card.root;
  rw.classList.remove('title-state');
  rw.style.fontSize=scaledFontSize(card.root);

  const tl=document.getElementById('rootTypeLabel');
  tl.textContent=card.type||'';

  // reset reveal button and answer bar
  const rb=document.getElementById('revealBtn');
  if(rb){rb.disabled=false;rb.textContent='Reveal answer';}
  const ab=document.getElementById('answerBar');
  if(ab){ab.classList.remove('show');ab.textContent='';}

  syncSegs();
  renderWords();
  updateCounter();
  renderCustomWordsList();
}

function renderWords(){
  const sec=document.getElementById('wordsSection');
  sec.innerHTML='';

  if(currentIdx===null){
    sec.innerHTML=`<div class="title-prompt">Select a key stage and subject filter,<br>then press the dice button to begin</div>`;
    const div=document.createElement('div');div.className='cover-divider';div.style.background=accentCol();sec.appendChild(div);
    return;
  }

  const card=CARDS[currentIdx];
  const words=wordsForLevel(card);

  if(words.length===0){
    const msg=document.createElement('div');msg.className='no-words-msg';msg.textContent='No words match this filter at this level for this root.';sec.appendChild(msg);
  } else if(mode==='B'){
    // Show all mode: always show definitions
    words.forEach(w=>{
      const d=document.createElement('div');d.className='word-tile tile-revealed';
      d.innerHTML=`<div class="tile-word-row">${hlWord(w.word,w.hl)}${subjTags(w.subj)}</div><div class="tile-note show">${w.note}</div>`;
      sec.appendChild(d);
    });
  } else {
    // Reveal words mode: tap to show word, definitions only after Reveal Answer
    words.forEach((w,i)=>{
      const d=document.createElement('div');
      const isRev=revealed.includes(i);
      if(!isRev){
        d.className='word-tile tile-hidden';
        d.style.cssText=`border-color:${accentCol()}55;`;
        d.textContent='tap to reveal';
        d.onclick=()=>{revealed.push(i);renderWords();};
      } else {
        d.className='word-tile tile-revealed';
        // definition only visible once solved
        const noteClass=solved?'tile-note show':'tile-note';
        d.innerHTML=`<div class="tile-word-row">${hlWord(w.word,w.hl)}${subjTags(w.subj)}</div><div class="${noteClass}">${w.note}</div>`;
      }
      sec.appendChild(d);
    });
  }

  const div=document.createElement('div');div.className='cover-divider';div.style.background=accentCol();sec.appendChild(div);
}

// ── CONTROLS ──
function syncSegs(){
  const c=accentCol();
  ['levelSeg','modeSeg'].forEach(id=>{
    document.querySelectorAll(`#${id} .seg-btn`).forEach(b=>{
      const a=b.classList.contains('active');
      b.style.background=a?c:'';b.style.borderColor=a?c:'';b.style.color=a?'#fff':'';
    });
  });
  // dice button accent
  const db=document.querySelector('.dice-btn');
  if(db)db.style.background=c;
}

function setLevel(l){
  level=l;
  document.querySelectorAll('#levelSeg .seg-btn').forEach((b,i)=>{
    const levels=['ks3','gcse','alevel'];
    const act=levels[i]===l;
    b.classList.toggle('active',act);
    b.style.background=act?accentCol():'';b.style.borderColor=act?accentCol():'';b.style.color=act?'#fff':'';
  });
  revealed=[];if(currentIdx!==null)renderWords();
}

function setMode(m){
  mode=m;
  document.querySelectorAll('#modeSeg .seg-btn').forEach((b,i)=>{
    const act=i===(m==='A'?0:1);
    b.classList.toggle('active',act);
    b.style.background=act?accentCol():'';b.style.borderColor=act?accentCol():'';b.style.color=act?'#fff':'';
  });
  renderWords();
}

function pickRandom(){
  const eligible=CARDS.map((_,i)=>i).filter(i=>{
    const ws=wordsForLevel(CARDS[i]);
    return ws.length>0;
  });
  if(eligible.length===0)return;
  let next;
  if(eligible.length===1){next=eligible[0];}
  else{do{next=eligible[Math.floor(Math.random()*eligible.length)];}while(next===currentIdx);}
  renderCard(next);
}

function updateCounter(){
  document.getElementById('cardCounter').textContent=currentIdx!==null?`Card ${currentIdx+1} of ${CARDS.length}`:'';
}

// ── REVEAL ANSWER ──
function revealAnswer(){
  if(currentIdx===null)return;
  solved=true;
  const card=CARDS[currentIdx];
  // reveal all remaining tiles
  const words=wordsForLevel(card);
  words.forEach((_,i)=>{if(!revealed.includes(i))revealed.push(i);});
  renderWords();
  // show answer bar
  const ab=document.getElementById('answerBar');
  if(ab){
    ab.textContent=`✓ ${card.root} — "${card.meaning}"  ·  ${card.origin}`;
    ab.classList.add('show');
  }
  const rb=document.getElementById('revealBtn');
  if(rb){rb.disabled=true;rb.textContent='Answer revealed';}
}

// ── CUSTOM PANEL TABS ──
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.panel-tab').forEach((b,i)=>b.classList.toggle('active',['word','card'][i]===tab));
  document.getElementById('tabWord').classList.toggle('active',tab==='word');
  document.getElementById('tabCard').classList.toggle('active',tab==='card');
  if(tab==='card')renderCustomCardsList();
  if(tab==='word'){renderSubjPicker();renderCustomWordsList();}
}

// ── CUSTOM WORD PANEL ──
function toggleCustom(){
  customPanelOpen=!customPanelOpen;
  document.getElementById('customPanel').classList.toggle('open',customPanelOpen);
  document.getElementById('customToggleBtn').textContent=customPanelOpen?'− Close':'＋ Add your own words to a card';
  if(customPanelOpen){renderSubjPicker();renderCustomWordsList();}
}

function addCustomWord(){
  if(currentIdx===null){alert('Please select a card first using the Random Root button.');return;}
  const word=document.getElementById('cwWord').value.trim();
  const note=document.getElementById('cwNote').value.trim();
  const hl=document.getElementById('cwHl').value.trim();
  const lvl=document.getElementById('cwLevel').value;
  if(!word||!note||!hl){alert('Please fill in Word, Definition and Highlight fields.');return;}
  const subj=selectedSubjPick.size>0?[...selectedSubjPick]:['Science'];
  const existing=loadCustomWords(CARDS[currentIdx].root);
  existing.push({word,note,hl,level:lvl,subj,custom:true});
  saveCustomWords(CARDS[currentIdx].root,existing);
  document.getElementById('cwWord').value='';
  document.getElementById('cwNote').value='';
  document.getElementById('cwHl').value='';
  selectedSubjPick.clear();
  renderSubjPicker();
  renderCustomWordsList();
  renderWords();
}

function renderCustomWordsList(){
  const list=document.getElementById('customWordsList');
  if(!list)return;
  list.innerHTML='';
  if(currentIdx===null){list.innerHTML='<span style="font-size:11px;color:#aaa;font-family:var(--sans);font-style:italic;">Select a card to manage its custom words</span>';return;}
  const words=loadCustomWords(CARDS[currentIdx].root);
  if(words.length===0){list.innerHTML='<span style="font-size:11px;color:#aaa;font-family:var(--sans);font-style:italic;">No custom words yet for this card</span>';return;}
  words.forEach((w,i)=>{
    const row=document.createElement('div');row.className='custom-word-item';
    row.innerHTML=`<span class="cw-word">${w.word}</span><span class="cw-note">${w.note}</span><button class="del-btn" title="Remove" onclick="removeCustomWord(${i})">✕</button>`;
    list.appendChild(row);
  });
}

function removeCustomWord(i){
  if(currentIdx===null)return;
  const words=loadCustomWords(CARDS[currentIdx].root);
  words.splice(i,1);
  saveCustomWords(CARDS[currentIdx].root,words);
  renderCustomWordsList();
  renderWords();
}

// ── CUSTOM CARD FUNCTIONS ──
function addCustomCard(){
  const root=document.getElementById('ncRoot').value.trim().toUpperCase();
  const type=document.getElementById('ncType').value;
  const meaning=document.getElementById('ncMeaning').value.trim();
  const origin=document.getElementById('ncOrigin').value.trim();
  if(!root||!meaning){alert('Please fill in Root and Meaning at minimum.');return;}
  if(CARDS.some(c=>c.root===root)){alert(`A card for "${root}" already exists.`);return;}
  const newCard={
    root,type,meaning,origin:origin||'',colour:Math.floor(Math.random()*5),
    synonyms:[meaning.toLowerCase()],words:[],custom:true
  };
  const existing=loadCustomCards();
  existing.push(newCard);
  saveCustomCards(existing);
  // rebuild CARDS
  CARDS=buildCards();
  document.getElementById('ncRoot').value='';
  document.getElementById('ncMeaning').value='';
  document.getElementById('ncOrigin').value='';
  renderCustomCardsList();
  updateCounter();
  alert(`Card for "${root}" created. Navigate to it using the Random Root button, then add words using the "Add word to card" tab.`);
}

function renderCustomCardsList(){
  const list=document.getElementById('customCardsList');
  if(!list)return;
  const custom=loadCustomCards();
  if(custom.length===0){
    list.innerHTML='<span style="font-size:11px;color:#aaa;font-family:var(--sans);font-style:italic;">No custom cards yet</span>';
    return;
  }
  list.innerHTML='';
  custom.forEach((c,i)=>{
    const row=document.createElement('div');row.className='custom-word-item';
    row.innerHTML=`<span class="cw-word">${c.root}</span><span class="cw-note">${c.meaning}</span><button class="del-btn" title="Delete card" onclick="deleteCustomCard(${i})">✕</button>`;
    list.appendChild(row);
  });
}

function deleteCustomCard(i){
  if(!confirm('Delete this custom card? This cannot be undone.'))return;
  const existing=loadCustomCards();
  const root=existing[i].root;
  existing.splice(i,1);
  saveCustomCards(existing);
  localStorage.removeItem(customKey(root));
  CARDS=buildCards();
  if(currentIdx!==null&&currentIdx>=CARDS.length)currentIdx=null;
  renderCustomCardsList();
  updateCounter();
  if(currentIdx===null)renderWords();
}

// ── INIT ──
renderSubjectFilter();
renderWords(); // title state
syncSegs();
</script>
